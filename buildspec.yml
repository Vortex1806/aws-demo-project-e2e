version: 0.2

cache:
  paths:
    - 'node_modules/**/*'
    - '/root/.cache/ms-playwright/**/*'

phases:

  install:
    runtime-versions:
      nodejs: 18

    commands:
      - echo "Installing dependencies"

      - npm ci

      - |
        if [ ! -d "/root/.cache/ms-playwright" ]; then
          echo "Installing Playwright browsers first time"
          npx playwright install chromium
        else
          echo "Playwright browsers already cached"
        fi

  build:
    commands:
      - echo "Running Playwright tests"

      - npm test

  post_build:
    commands:
      - echo "Deploying website"

      - mkdir -p ~/.ssh

      - echo "$EC2_SSH_KEY_B64" | base64 -d > ~/.ssh/id_rsa

      - chmod 600 ~/.ssh/id_rsa

      - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      - scp -r index.html style.css ubuntu@$EC2_HOST:/tmp/

      - |
        ssh ubuntu@$EC2_HOST "
        sudo cp /tmp/index.html /var/www/html/index.html &&
        sudo cp /tmp/style.css /var/www/html/style.css
        "

artifacts:
  files:
    - '**/*'